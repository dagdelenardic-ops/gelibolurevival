<title>Çanakkale 1915 – İnteraktif Savaş Haritası</title>
<style>
  :root {
    --bg:#1a1810;--bg-panel:#21201a;--parchment:#d5c8a1;--parchment-d:#b0a47a;
    --ink:#2c2a22;--sea:#1b3a4b;--sea-light:#2a5a6e;--land:#3d4a2c;--land-light:#586e3a;
    --ottoman:#c0392b;--ottoman-l:#e74c3c;--british:#2e6ca4;--british-l:#5b9bd5;
    --anzac:#27864a;--anzac-l:#3cb371;--french:#7b4ea3;--french-l:#a77bca;
    --gold:#c9a84c;--gold-dim:#8a7535;--text:#e8dcc6;--text-muted:#9c9280;
    --border:#3d3929;--timeline-bg:#15140f;
    --mono:"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;
    --sans:"Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg-panel);border-bottom:1px solid var(--border);flex-shrink:0}
  .topbar-title{font-size:1.1rem;font-weight:700;letter-spacing:.02em;color:var(--parchment)}
  .topbar-title span{color:var(--gold)}
  .phase-indicator{font-family:var(--mono);font-size:.8rem;color:var(--text-muted);background:rgba(201,168,76,.12);border:1px solid var(--gold-dim);border-radius:6px;padding:4px 12px}
  .legend{display:flex;gap:16px;align-items:center}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--text-muted)}
  .legend-icon{width:14px;height:14px;display:flex;align-items:center;justify-content:center}
  .map-container{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;overflow:hidden;position:relative}
  .map-container svg{width:100%;height:100%;max-width:1400px;max-height:calc(100vh - 130px)}
  .unit-token{cursor:pointer;transition:transform .34s linear, opacity .24s linear, filter .18s;transform-box:fill-box;transform-origin:center}
  .unit-token.is-moving{filter:drop-shadow(var(--trail-x1,0px) var(--trail-y1,0px) 4px rgba(231,201,126,.45)) drop-shadow(var(--trail-x2,0px) var(--trail-y2,0px) 8px rgba(231,201,126,.25))}
  .unit-token.is-muted{filter:saturate(.45) brightness(.72)}
  .unit-token.is-active{filter:brightness(1.22) drop-shadow(0 0 6px rgba(231,201,126,.45))}
  .unit-token:hover{filter:brightness(1.3) drop-shadow(0 0 6px rgba(255,255,255,.3))}
  .battle-effects{pointer-events:none}
  .battery-shot{stroke:#f7cf74;stroke-width:1.15;stroke-linecap:round;stroke-dasharray:2 7;opacity:.55;animation:shotDash .55s linear infinite;animation-delay:var(--shot-delay,0s)}
  .battery-impact{fill:rgba(247,207,116,.18);stroke:rgba(247,207,116,.5);stroke-width:.9}
  @keyframes shotDash{
    from{stroke-dashoffset:0}
    to{stroke-dashoffset:-18}
  }
  .unit-label{font-family:var(--mono);pointer-events:none;opacity:.85}
  .location-label{font-family:var(--mono);font-size:7.5px;fill:var(--parchment-d);opacity:.75}
  .location-dot{fill:var(--gold-dim);opacity:.6}
  .units-layer{transition:opacity .2s ease}
  .timeline{flex-shrink:0;background:var(--timeline-bg);border-top:1px solid var(--border);padding:10px 18px 12px;display:flex;align-items:center;gap:14px}
  .timeline-label{font-family:var(--mono);font-size:.72rem;color:var(--text-muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;min-width:70px}
  .timeline-controls{display:flex;align-items:center;gap:10px}
  .timeline-btn{border:1px solid var(--gold-dim);background:rgba(201,168,76,.12);color:var(--parchment);padding:5px 12px;border-radius:999px;font-size:.72rem;font-family:var(--mono);cursor:pointer;transition:background .2s}
  .timeline-btn:hover{background:rgba(201,168,76,.22)}
  .timeline-track{flex:1;position:relative;height:56px;display:flex;align-items:center;overflow-x:auto;overflow-y:visible;scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
  .timeline-line{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--border);border-radius:2px;transform:translateY(-50%)}
  .timeline-phases{position:relative;display:flex;align-items:center;gap:8px;z-index:1;padding:0 6px;min-width:max-content}
  .phase-marker{position:relative;display:flex;align-items:center;justify-content:center;width:16px;height:40px;border:0;background:transparent;cursor:pointer;transition:transform .2s}
  .phase-marker:hover{transform:translateY(-1px) scale(1.06)}
  .phase-dot{width:6px;height:6px;border-radius:50%;border:1px solid var(--gold-dim);background:#72663a;transition:transform .16s linear,background .2s,border-color .2s,box-shadow .2s}
  .phase-marker.major .phase-dot{width:12px;height:12px;border-width:2px;background:#8f7a3b}
  .phase-marker:hover .phase-dot{transform:scale(1.28);background:#bea75b}
  .phase-marker.active .phase-dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(201,168,76,.55);transform:scale(1.2)}
  .phase-tooltip{position:absolute;bottom:30px;left:50%;transform:translate(-50%,8px) scale(.96);padding:6px 9px;background:rgba(26,24,16,.97);border:1px solid var(--gold-dim);border-radius:10px;color:var(--parchment);font-family:var(--mono);font-size:.63rem;white-space:nowrap;opacity:0;pointer-events:none;transition:transform .18s ease,opacity .18s ease;box-shadow:0 8px 18px rgba(0,0,0,.45)}
  .phase-tooltip-date{display:block;color:var(--text-muted);font-size:.56rem;margin-top:2px}
  .phase-marker:hover .phase-tooltip,.phase-marker:focus-visible .phase-tooltip{opacity:1;transform:translate(-50%,-4px) scale(1)}
  .phase-marker.active .phase-tooltip{border-color:var(--gold)}
  @keyframes pulsePhase{
    0%{box-shadow:0 0 0 0 rgba(201,168,76,.42)}
    100%{box-shadow:0 0 0 10px rgba(201,168,76,0)}
  }
  .narration-box{position:absolute;bottom:12px;left:12px;background:rgba(26,24,16,.92);border:1px solid var(--border);border-radius:8px;padding:10px 14px;max-width:340px;min-height:118px;backdrop-filter:blur(4px)}
  .narration-title{font-family:var(--mono);font-size:.72rem;color:var(--gold);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
  .narration-text{font-size:.8rem;color:var(--text-muted);line-height:1.5}
  .narration-transition{margin-top:6px;padding-top:6px;border-top:1px dashed rgba(201,168,76,.28);font-family:var(--mono);font-size:.68rem;color:#b8aa88;line-height:1.4}
  .map-date-chip{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:9px;background:linear-gradient(145deg,rgba(16,27,36,.92),rgba(25,20,12,.94));border:1px solid rgba(201,168,76,.45);border-radius:999px;padding:8px 14px;box-shadow:0 10px 24px rgba(0,0,0,.35);z-index:3}
  .map-date-day{font-family:var(--mono);font-size:1rem;color:var(--gold);font-weight:700;min-width:24px;text-align:right}
  .map-date-month{font-family:var(--mono);font-size:.72rem;color:var(--parchment);letter-spacing:.08em;text-transform:uppercase}
  .map-date-year{font-family:var(--mono);font-size:.72rem;color:var(--text-muted);padding-left:8px;border-left:1px solid rgba(201,168,76,.28)}
  .unit-panel{position:fixed;top:0;right:0;height:100%;width:min(340px,82vw);max-width:86vw;background:linear-gradient(190deg,rgba(33,32,26,.98),rgba(24,22,15,.98));border-left:1px solid var(--border);box-shadow:-18px 0 40px rgba(0,0,0,.4);transform:translateX(100%);transition:transform .33s ease;z-index:6;display:flex;flex-direction:column;overflow:auto;padding:14px 16px 18px}
  .unit-panel.open{transform:translateX(0)}
  .unit-panel-title{font-family:var(--mono);font-size:.95rem;color:var(--gold);letter-spacing:.04em;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .panel-close{border:1px solid var(--gold-dim);background:rgba(201,168,76,.08);color:var(--text);width:28px;height:28px;border-radius:999px;cursor:pointer}
  .unit-panel dl{display:grid;gap:10px;color:var(--text-muted);font-size:.84rem}
  .unit-panel dt{color:var(--parchment);margin-bottom:2px}
  .unit-panel dd{margin:0;color:var(--text);line-height:1.45}
  </style>

function isoToUTCDate(iso) {
  const [y, m, d] = String(iso).split('-').map(Number);
  return new Date(Date.UTC(y, (m || 1) - 1, d || 1));
}

function utcDateToISO(d) {
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, '0');
  const day = String(d.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function addUTCDateDays(d, n) {
  return new Date(d.getTime() + n * 86400000);
}

function formatISOToTR(iso) {
  const d = isoToUTCDate(iso);
  return `${String(d.getUTCDate()).padStart(2, '0')} ${TR_MONTHS[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}

function normalizeDateText(dateText, order = 0) {
  const raw = String(dateText || '').trim();
  if (!raw) return `1915-01-${String(Math.max(1, Math.min(28, order + 1))).padStart(2, '0')}`;
  const clean = raw.replace(/[–—]/g, '-').replace(/\s+/g, ' ');
  const monthMap = {
    ocak: 1, subat: 2, mart: 3, nisan: 4, mayis: 5, haziran: 6,
    temmuz: 7, agustos: 8, eylul: 9, ekim: 10, kasim: 11, aralik: 12
  };
  const normalizeMonth = (s) => String(s || '').toLowerCase()
    .replace(/ı/g, 'i').replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ö/g, 'o').replace(/ç/g, 'c');

  const full = clean.match(/(\d{1,2})\s+([A-Za-zÇĞİÖŞÜçğıöşü]+)\s+(\d{4})/);
  if (full) {
    const m = monthMap[normalizeMonth(full[2])] || 1;
    return `${full[3]}-${String(m).padStart(2, '0')}-${String(Number(full[1])).padStart(2, '0')}`;
  }

  const rangedMonth = clean.match(/([A-Za-zÇĞİÖŞÜçğıöşü]+)\s*-\s*([A-Za-zÇĞİÖŞÜçğıöşü]+)\s+(\d{4})/);
  if (rangedMonth) {
    const m = monthMap[normalizeMonth(rangedMonth[1])] || 1;
    return `${rangedMonth[3]}-${String(m).padStart(2, '0')}-01`;
  }

  const monthYear = clean.match(/([A-Za-zÇĞİÖŞÜçğıöşü]+)\s+(\d{4})/);
  if (monthYear) {
    const m = monthMap[normalizeMonth(monthYear[1])] || 1;
    return `${monthYear[2]}-${String(m).padStart(2, '0')}-15`;
  }

  const yearOnly = clean.match(/\b(19\d{2})\b/);
  if (yearOnly) return `${yearOnly[1]}-01-01`;
  return `1915-01-${String(Math.max(1, Math.min(28, order + 1))).padStart(2, '0')}`;
}

function dayDiffISO(a, b) {
  return Math.round((isoToUTCDate(b).getTime() - isoToUTCDate(a).getTime()) / 86400000);
}

function chooseBlendedValue(prev, next, ratio, seed) {
  if (!prev && !next) return undefined;
  if (!prev) return next;
  if (!next) return prev;
  if (prev === next) return prev;
  const threshold = ((seed % 100) / 100);
  return ratio >= threshold ? next : prev;
}

function blendObjectMaps(prevMap, nextMap, ratio, salt = 0) {
  const prev = prevMap && typeof prevMap === 'object' ? prevMap : {};
  const next = nextMap && typeof nextMap === 'object' ? nextMap : {};
  const out = {};
  [...new Set([...Object.keys(prev), ...Object.keys(next)])].forEach((key) => {
    const val = chooseBlendedValue(prev[key], next[key], ratio, unitSeed(`${key}:${salt}`));
    if (val) out[key] = val;
  });
  return Object.keys(out).length ? out : null;
}

function mergeLocationIdArrays(a, b) {
  const merged = [...new Set([...(Array.isArray(a) ? a : []), ...(Array.isArray(b) ? b : [])])];
  return merged.length ? merged : ['gelibolu'];
}

function buildDailyHistoricalPhases(templatePhases = []) {
  const start = isoToUTCDate('1914-11-03');
  const end = isoToUTCDate('1916-01-09');
  const totalDays = dayDiffISO(utcDateToISO(start), utcDateToISO(end)) + 1;
  const anchorsByIso = HISTORICAL_ANCHORS.reduce((acc, a) => { acc[a.iso] = a; return acc; }, {});

  const parsed = (Array.isArray(templatePhases) ? templatePhases : [])
    .map((p, idx) => ({ ...p, isoStart: p.isoStart || normalizeDateText(p.date, idx) }))
    .sort((a, b) => (a.isoStart < b.isoStart ? -1 : a.isoStart > b.isoStart ? 1 : 0));

  const parsedByIso = {};
  parsed.forEach((p) => {
    const prev = parsedByIso[p.isoStart];
    if (!prev || (p.importance === 'major' && prev.importance !== 'major')) parsedByIso[p.isoStart] = p;
  });

  const daily = [];
  let pointer = 0;
  for (let i = 0; i < totalDays; i++) {
    const d = addUTCDateDays(start, i);
    const iso = utcDateToISO(d);
    while (pointer + 1 < parsed.length && parsed[pointer + 1].isoStart <= iso) pointer += 1;
    const active = parsed[pointer] || parsed[0] || {};
    const next = parsed[pointer + 1] || active;
    const span = Math.max(1, dayDiffISO(active.isoStart || iso, next.isoStart || iso));
    const ratio = normalizeValue(dayDiffISO(active.isoStart || iso, iso) / span, 0, 1);
    const exactParsed = parsedByIso[iso] || null;
    const anchor = anchorsByIso[iso] || null;
    const base = exactParsed || active;

    daily.push({
      id: `gun-${String(i + 1).padStart(4, '0')}`,
      isoStart: iso,
      date: formatISOToTR(iso),
      title: anchor ? anchor.title : (exactParsed ? exactParsed.title : ((base.title || 'Cephe Günü') + ' · Günlük Akış')),
      narration: anchor ? anchor.narration : (exactParsed ? exactParsed.narration : (base.narration || `${formatISOToTR(iso)} tarihinde cephede hareketlilik sürdü.`)),
      importance: anchor ? 'major' : (exactParsed ? exactParsed.importance : 'minor'),
      locationIds: anchor && Array.isArray(anchor.locationIds) ? anchor.locationIds : mergeLocationIdArrays(active.locationIds, next.locationIds),
      locationByFaction: anchor && anchor.locationByFaction ? anchor.locationByFaction : blendObjectMaps(active.locationByFaction, next.locationByFaction, ratio, i + 11),
      locationByUnit: blendObjectMaps(active.locationByUnit, next.locationByUnit, ratio, i + 23),
      statusByFaction: blendObjectMaps(active.statusByFaction, next.statusByFaction, ratio, i + 37),
      objectiveByFaction: blendObjectMaps(active.objectiveByFaction, next.objectiveByFaction, ratio, i + 49),
      outcomeByFaction: blendObjectMaps(active.outcomeByFaction, next.outcomeByFaction, ratio, i + 67)
    });
  }

  return daily;
}

function getParsedPhasesFromBook() {
  const parsed = window.BOOK_PHASE_EVENTS;
  if (!Array.isArray(parsed) || !parsed.length) return null;
  return parsed
    .map((p, i) => ({
      id: String(p.id || `epub-faz-${String(i + 1).padStart(2, '0')}`),
      date: p.date || '1915',
      isoStart: p.isoStart || p.isoDate || null,
      title: (p.title && p.title.trim()) || `Faz ${i + 1}`,
      narration: p.narration || `Kaynak metin: ${p.titleEn || p.title || 'Bilinmiyor'}.`,
      importance: p.importance === 'major' ? 'major' : 'minor',
      locationIds: Array.isArray(p.locationIds) ? p.locationIds : [],
      locationByFaction: p.locationByFaction && typeof p.locationByFaction === 'object' ? p.locationByFaction : null,
      locationByUnit: p.locationByUnit && typeof p.locationByUnit === 'object' ? p.locationByUnit : null,
      statusByFaction: p.statusByFaction && typeof p.statusByFaction === 'object' ? p.statusByFaction : null,
      objectiveByFaction: p.objectiveByFaction && typeof p.objectiveByFaction === 'object' ? p.objectiveByFaction : null,
      outcomeByFaction: p.outcomeByFaction && typeof p.outcomeByFaction === 'object' ? p.outcomeByFaction : null
    }))
    .filter(Boolean);
}

function ensureExpandedPhases() {
  const parsedPhases = getParsedPhasesFromBook();
  WEEKLY_GUIDE = Array.isArray(window.BOOK_WEEKLY_GUIDE) ? window.BOOK_WEEKLY_GUIDE : [];
  if (parsedPhases && parsedPhases.length > 0) {
    BATTLE_DATA.phases = parsedPhases
      .map((p, idx) => ({ ...p, isoStart: p.isoStart || normalizeDateText(p.date, idx) }))
      .sort((a, b) => (a.isoStart < b.isoStart ? -1 : a.isoStart > b.isoStart ? 1 : 0));
    return;
  }
  BATTLE_DATA.phases = buildDailyHistoricalPhases(BATTLE_DATA.phases);
}

function normalizeValue(value, min, max) { return Math.max(min, Math.min(max, value)); }

function unitSeed(id) {
  let s = 0;
  for (let i = 0; i < id.length; i++) s = (s * 37 + id.charCodeAt(i)) % 9973;
  return s;
}

function phaseDirectionByUnit(unit) {
  const f = BATTLE_DATA.factions[unit.faction];
  if (unit.type === 'deniz') return f.id === 'british' ? {x: -0.4, y: -0.15} : {x: 0.45, y: -0.35};
  if (f.id === 'ottoman') return {x: -0.35, y: -0.22};
  if (f.id === 'british') return {x: 0.7, y: 0.25};
  if (f.id === 'anzac') return {x: 0.9, y: 0.18};
  return {x: 0.3, y: 0.22};
}

function resolveLocationPoint(candidate, unit, phaseIndex) {
  const ids = Array.isArray(candidate) ? candidate : [candidate];
  const seed = unitSeed(unit.id) + phaseIndex;
  const unique = ids.filter(Boolean).map((id) => String(id).trim().toLowerCase());
  for (let i = 0; i < unique.length; i++) {
    const loc = LOCATION_BY_ID[unique[i]];
    if (loc) {
      const jitter = {
        x: Math.round(Math.sin(seed + i) * 2),
        y: Math.round(Math.cos(seed * 1.2 + i) * 2)
      };
      return {
        x: normalizeValue(Math.round(loc.x + jitter.x), 45, 680),
        y: normalizeValue(Math.round(loc.y + jitter.y), 18, 548),
        source: unique[i]
      };
    }
  }
  return null;
}

function resolvePhaseLocation(phase, unit, phaseIndex) {
  if (!phase) return null;
  const byUnit = phase.locationByUnit && phase.locationByUnit[unit.id];
  if (byUnit) return resolveLocationPoint(byUnit, unit, phaseIndex + 1);
  const byFaction = phase.locationByFaction && phase.locationByFaction[unit.faction];
  if (byFaction) return resolveLocationPoint(byFaction, unit, phaseIndex + 1);
  if (Array.isArray(phase.locationIds) && phase.locationIds.length) return resolveLocationPoint(phase.locationIds, unit, phaseIndex + 1);
  return null;
}

function resolvePhaseMetaText(phase, unit, key) {
  const byFaction = phase && phase[`${key}ByFaction`];
  if (byFaction && byFaction[unit.faction]) return byFaction[unit.faction];
  return null;
}

function isMajorPhase(phase) {
  return !phase || phase.importance !== 'minor';
}

function computeUnitEntryPhaseIndexes() {
  const map = {};

  BATTLE_DATA.units.forEach((unit) => {
    const minIso = getMinimumStartIsoForUnit(unit);
    const minIsoIndex = getFirstPhaseIndexForIso(minIso);
    if (unit.type === 'deniz') {
      map[unit.id] = minIsoIndex;
      return;
    }
    let entryIndex = BATTLE_DATA.phases.findIndex((phase, idx) => {
      if (idx < minIsoIndex) return false;
      if (!isMajorPhase(phase)) return false;
      if (phase.locationByUnit && phase.locationByUnit[unit.id]) return true;
      if (phase.locationByFaction && phase.locationByFaction[unit.faction]) return true;
      if (!Array.isArray(phase.locationIds) || !phase.locationIds.length) return false;
      if (unit.type === 'deniz') {
        return phase.locationIds.some((id) => id === 'bogaz' || id === 'canakkale' || id === 'kumkale' || id === 'seddulbahir');
      }
      return true;
    });

    if (entryIndex === -1) entryIndex = minIsoIndex;
    map[unit.id] = entryIndex;
  });

  UNIT_ENTRY_PHASE_INDEX = map;
}

function computePhaseMajorOrder() {
  let majorCount = 0;
  PHASE_MAJOR_ORDER = BATTLE_DATA.phases.map((phase) => {
    if (isMajorPhase(phase)) majorCount += 1;
    return majorCount || 1;
  });
  const firstLandings = BATTLE_DATA.phases.findIndex((phase) => String(phase.isoStart || '') >= '1915-04-25');
  NAVAL_ERA_END_INDEX = firstLandings === -1 ? Math.max(0, BATTLE_DATA.phases.length - 1) : Math.max(0, firstLandings - 1);
}

function getFirstPhaseIndexForIso(isoDate) {
  const idx = BATTLE_DATA.phases.findIndex((phase) => String(phase.isoStart || '') >= isoDate);
  return idx === -1 ? 0 : idx;
}

function getMinimumStartIsoForUnit(unit) {
  if (unit.type === 'deniz' && unit.faction !== 'ottoman') return '1914-11-03';
  if (unit.faction !== 'ottoman') return '1915-04-25';
  return '1914-11-03';
}

function getUnitEntryOrigin(unit, targetBase) {
  const seed = unitSeed(unit.id);
  let x = targetBase.x;
  let y = targetBase.y;

  if (unit.type === 'deniz' && unit.faction !== 'ottoman') {
    x += 190 + (seed % 35);
    y += ((seed % 9) - 4) * 9;
  } else if (unit.faction === 'anzac') {
    x -= 190 + (seed % 45);
    y += 30 + ((seed % 11) - 5) * 8;
  } else if (unit.faction === 'british' || unit.faction === 'french') {
    x += 150 + (seed % 40);
    y += 70 + ((seed % 9) - 4) * 8;
  } else {
    x += (seed % 2 ? -1 : 1) * (85 + (seed % 40));
    y -= 100 + (seed % 30);
  }

  return {
    x: normalizeValue(Math.round(x), 45, 680),
    y: normalizeValue(Math.round(y), 18, 548)
  };
}

function isNavalEraPhaseIndex(phaseIndex) {
  return phaseIndex >= 0 && phaseIndex <= NAVAL_ERA_END_INDEX;
}

function getNavalEraProgress(phaseIndex) {
  if (!isNavalEraPhaseIndex(phaseIndex)) return 1;
  if (NAVAL_ERA_END_INDEX <= 0) return 1;
  return normalizeValue(phaseIndex / NAVAL_ERA_END_INDEX, 0, 1);
}

function getNarrativeNavalPosition(unit, phaseIndex) {
  if (!isNavalEraPhaseIndex(phaseIndex)) return null;
  const t = getNavalEraProgress(phaseIndex);
  const seed = unitSeed(unit.id);

  // Müttefik deniz unsurları: açık denizden boğaza yaklaşma
  if (unit.type === 'deniz' && unit.faction !== 'ottoman') {
    const laneById = {
      'hms-queen-elizabeth': 0,
      'hms-irresistible': 1,
      'hms-ocean': 2,
      bouvet: 3,
      suffren: 4
    };
    const lane = laneById[unit.id] ?? (seed % 5);
    const startX = 690 + lane * 10;
    const startY = 302 + lane * 30;
    const endX = 505 + lane * 8;
    const endY = 333 + lane * 16;
    return {
      x: normalizeValue(Math.round(startX + (endX - startX) * t), 45, 680),
      y: normalizeValue(Math.round(startY + (endY - startY) * t + Math.sin((phaseIndex + seed) * 0.22) * 3), 18, 548)
    };
  }

  // Nusret: mayın hattı çevresinde kontrollü hareket
  if (unit.id === 'nusret') {
    return {
      x: normalizeValue(Math.round(454 + Math.sin((phaseIndex + seed) * 0.35) * 7), 45, 680),
      y: normalizeValue(Math.round(382 + Math.cos((phaseIndex + seed) * 0.28) * 5), 18, 548)
    };
  }

  // Osmanlı kara/topçu birlikleri: kıyı bataryalarına yayılım
  if (unit.faction === 'ottoman' && unit.type !== 'deniz') {
    const batteryLine = [
      { x: 405, y: 340 }, { x: 400, y: 365 }, { x: 395, y: 385 },
      { x: 415, y: 310 }, { x: 498, y: 345 }, { x: 495, y: 365 }
    ];
    const slot = seed % batteryLine.length;
    const anchor = batteryLine[slot];
    return {
      x: normalizeValue(Math.round(anchor.x + ((seed % 5) - 2) * 3 + Math.sin((phaseIndex + slot) * 0.21) * 2), 45, 680),
      y: normalizeValue(Math.round(anchor.y + ((Math.floor(seed / 7) % 5) - 2) * 2 + Math.cos((phaseIndex + slot) * 0.19) * 2), 18, 548)
    };
  }

  return null;
}

function getClusterOffset(spreadState, x, y, unit, phaseIndex) {
  const key = `${Math.round(x)}|${Math.round(y)}`;
  const bucket = spreadState[key] || [];
  const idx = bucket.length;
  bucket.push(unit.id);
  spreadState[key] = bucket;
  const ring = Math.floor(idx / 6);
  const slot = idx % 6;
  const radius = PHASE_TOKEN_SPREAD + ring * 2.2;
  const angle = ((idx * 58 + unitSeed(unit.id) + phaseIndex * 9) % 360) * Math.PI / 180;
  return {
    x: Math.round(Math.cos(angle) * (slot === 0 ? 1 : radius)),
    y: Math.round(Math.sin(angle) * (slot === 0 ? 1 : radius))
  };
}

function deriveUnitPhaseState(unit, i, phaseTitle) {
  const period = i % 3;
  const roleTag = unit.type === 'deniz' ? 'sualtı harekâtı' : 'taarruz';
  if (period === 0) return `hazır`;
  if (period === 1) return roleTag;
  return `harekette`;
}

function expandUnitTrails() {
  const phaseIds = BATTLE_DATA.phases.map((p) => p.id);
  if (!phaseIds.length) return;
  BATTLE_DATA.units.forEach((unit) => {
    const startIndexRaw = UNIT_ENTRY_PHASE_INDEX[unit.id];
    const startIndex = Number.isInteger(startIndexRaw)
      ? Math.max(0, Math.min(phaseIds.length - 1, startIndexRaw))
      : 0;
    const startPhase = BATTLE_DATA.phases[startIndex];
    if (!startPhase) return;

    const hintedStart = resolvePhaseLocation(startPhase, unit, startIndex);
    const baseData = unit.phases[startPhase.id] || unit.phases[BASE_PHASE_ID] || hintedStart;
    if (!baseData) return;

    let x = baseData.x;
    let y = baseData.y;
    const drift = phaseDirectionByUnit(unit);
    const seed = unitSeed(unit.id);
    const startStatus = resolvePhaseMetaText(startPhase, unit, 'status') || (unit.phases[startPhase.id] && unit.phases[startPhase.id].status) || 'hazır';
    const startObjective = resolvePhaseMetaText(startPhase, unit, 'objective') || (unit.phases[startPhase.id] && unit.phases[startPhase.id].objective) || 'Temel görev başlangıcı';
    const startOutcome = resolvePhaseMetaText(startPhase, unit, 'outcome') || (unit.phases[startPhase.id] && unit.phases[startPhase.id].outcome) || 'Saha dağılımı tamamlandı';
    unit.phases[startPhase.id] = { x: Math.round(x), y: Math.round(y), status: startStatus, objective: startObjective, outcome: startOutcome };

    for (let i = startIndex + 1; i < phaseIds.length; i++) {
      const pid = phaseIds[i];
      const phase = BATTLE_DATA.phases[i];
      if (!unit.phases[pid]) {
        const hinted = resolvePhaseLocation(phase, unit, i);
        if (hinted) {
          x = hinted.x;
          y = hinted.y;
        } else {
          const fx = Math.sin((i + seed) * 0.42) * 3;
          const fy = Math.cos((i + seed) * 0.53) * 3;
          x = normalizeValue(x + drift.x * 7 + fx, 45, 680);
          y = normalizeValue(y + drift.y * 7 + fy, 18, 548);
        }

        const status = resolvePhaseMetaText(phase, unit, 'status') || deriveUnitPhaseState(unit, i, phase && phase.title);
        const objective = resolvePhaseMetaText(phase, unit, 'objective') || `${phase ? phase.title : 'Sıradaki'} kapsamında konum al`;
        const outcome = resolvePhaseMetaText(phase, unit, 'outcome') || `${phase ? phase.title : 'Sıradaki'} hedefi için pozisyon alındı`;
        unit.phases[pid] = {
          x: Math.round(x),
          y: Math.round(y),
          status,
          objective,
          outcome
        };
      } else {
        const existing = unit.phases[pid];
        x = existing.x ?? x;
        y = existing.y ?? y;
      }
    }
  });
}

function hydrateTimelineData() {
  ensureExpandedPhases();
  computePhaseMajorOrder();
  computeUnitEntryPhaseIndexes();
  expandUnitTrails();
}

  hydrateTimelineData();
  initPositions();
  renderTopBar();
  renderMap();
  renderTimeline();
  const closePanelBtn = document.getElementById('closeUnitPanelBtn');
  if (closePanelBtn) closePanelBtn.addEventListener('click', hideUnitPanel);
  setActivePhase(0);
  refreshAutoPlayButton();
  startAutoPlay();

function initPositions() {
  const firstPhase = BATTLE_DATA.phases[currentPhaseIndex]?.id;
  if (!firstPhase) return;
  BATTLE_DATA.units.forEach((u) => {
    const d = u.phases[firstPhase];
    if (d) currentPositions[u.id] = { x: d.x, y: d.y };
  });

function startAutoPlay() {
  if (isAutoPlaying) return;
  isAutoPlaying = true;
  autoplayTimer = setInterval(() => setActivePhase(currentPhaseIndex + 1), AUTO_PLAY_INTERVAL);
  refreshAutoPlayButton();
}

function stopAutoPlay() {
  isAutoPlaying = false;
  if (autoplayTimer) clearInterval(autoplayTimer);
  autoplayTimer = null;
  refreshAutoPlayButton();
}

function toggleAutoPlay() {
  isAutoPlaying ? stopAutoPlay() : startAutoPlay();
}

function refreshAutoPlayButton() {
  const btn = document.getElementById('playPauseBtn');
  if (!btn) return;
  btn.textContent = isAutoPlaying ? 'Duraklat' : 'Başlat';
  btn.setAttribute('aria-label', isAutoPlaying ? 'Animasyonu duraklat' : 'Animasyonu başlat');
}

function getPhaseIndexByIso(iso) {
  if (!iso) return 0;
  const idx = BATTLE_DATA.phases.findIndex((p) => String(p.isoStart || '') >= iso);
  return idx === -1 ? Math.max(0, BATTLE_DATA.phases.length - 1) : idx;
}

function getActiveWeekIndex() {
  if (!WEEKLY_GUIDE.length) return currentPhaseIndex;
  const iso = String(BATTLE_DATA.phases[currentPhaseIndex]?.isoStart || '');
  const idx = WEEKLY_GUIDE.findIndex((w) => w.startIso <= iso && iso <= w.endIso);
  if (idx !== -1) return idx;
  if (iso < WEEKLY_GUIDE[0].startIso) return 0;
  return WEEKLY_GUIDE.length - 1;
}

function updateTimelineActiveState() {
  const activeWeekIndex = getActiveWeekIndex();
  document.querySelectorAll('.phase-marker').forEach((el) => {
    el.classList.toggle('active', Number(el.dataset.weekIndex) === activeWeekIndex);
  });
}

function focusActiveTimelineMarker() {
  const marker = document.querySelector('.phase-marker.active');
  if (!marker || typeof marker.scrollIntoView !== 'function') return;
  marker.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function splitDisplayDateParts(dateText) {
  const raw = String(dateText || '').trim();
  const ranged = raw.match(/(\d{1,2})\s*[–-]\s*\d{1,2}\s+([A-Za-zÇĞİÖŞÜçğıöşü]+)\s+(\d{4})/);
  if (ranged) return { day: ranged[1], month: ranged[2], year: ranged[3] };
  const full = raw.match(/(\d{1,2})\s+([A-Za-zÇĞİÖŞÜçğıöşü]+)\s+(\d{4})/);
  if (full) return { day: full[1], month: full[2], year: full[3] };
  const monthYear = raw.match(/([A-Za-zÇĞİÖŞÜçğıöşü]+)\s+(\d{4})/);
  if (monthYear) return { day: '—', month: monthYear[1], year: monthYear[2] };
  const yearOnly = raw.match(/\b(\d{4})\b/);
  if (yearOnly) return { day: '—', month: 'Yıl', year: yearOnly[1] };
  return { day: '—', month: raw || 'Tarih', year: '' };
}

function updateMapDateIndicator(dateText) {
  const day = document.getElementById('mapDateDay');
  const month = document.getElementById('mapDateMonth');
  const year = document.getElementById('mapDateYear');
  if (!day || !month || !year) return;
  const parts = splitDisplayDateParts(dateText);
  day.textContent = parts.day;
  month.textContent = parts.month;
  year.textContent = parts.year;
}

function normalizeAnimName(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/ı/g, 'i')
    .replace(/ğ/g, 'g')
    .replace(/ü/g, 'u')
    .replace(/ş/g, 's')
    .replace(/ö/g, 'o')
    .replace(/ç/g, 'c')
    .replace(/[^a-z0-9\s.-]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function renderUnits(animationUnits) {
  const tg = document.getElementById('unitTokens');
  if (!tg) return;
  const nodes = [...tg.querySelectorAll('.unit-token')];
  if (!nodes.length) return;

  const unitById = BATTLE_DATA.units.reduce((acc, u) => { acc[u.id] = u; return acc; }, {});
  const baseOpacity = (el) => {
    const cached = Number(el.dataset.baseOpacity);
    if (Number.isFinite(cached)) return cached;
    const current = Number(el.style.opacity);
    const base = Number.isFinite(current) ? current : 1;
    el.dataset.baseOpacity = String(base);
    return base;
  };
  const reset = () => {
    nodes.forEach((el) => {
      const base = baseOpacity(el);
      el.style.opacity = String(base);
      el.classList.remove('is-muted', 'is-active');
    });
  };

  if (!Array.isArray(animationUnits)) {
    reset();
    return;
  }
  if (!animationUnits.length) {
    nodes.forEach((el) => {
      const base = baseOpacity(el);
      el.style.opacity = String(Math.max(0.12, base * 0.26));
      el.classList.add('is-muted');
      el.classList.remove('is-active');
    });
    return;
  }

  const targetNames = new Set(animationUnits.map((u) => normalizeAnimName(u && u.name)).filter(Boolean));
  const wantedSides = new Set(animationUnits.map((u) => String(u && u.side || '').toLowerCase()).filter(Boolean));
  const tokenNames = nodes.map((el) => normalizeAnimName(el.dataset.unitName || ''));
  const hasNameOverlap = [...targetNames].some((target) => tokenNames.some((name) => name && (name === target || name.includes(target) || target.includes(name))));

  nodes.forEach((el) => {
    const base = baseOpacity(el);
    const name = normalizeAnimName(el.dataset.unitName || '');
    const model = unitById[el.dataset.unitId];
    const side = model && model.faction === 'ottoman' ? 'ottoman' : 'allied';
    const nameMatch = [...targetNames].some((target) => name && (name === target || name.includes(target) || target.includes(name)));
    const sideMatch = wantedSides.size ? wantedSides.has(side) : true;
    const active = hasNameOverlap ? nameMatch : sideMatch;

    if (active) {
      el.style.opacity = String(Math.min(1, Math.max(base, 0.85)));
      el.classList.add('is-active');
      el.classList.remove('is-muted');
    } else {
      el.style.opacity = String(Math.max(0.12, base * 0.3));
      el.classList.add('is-muted');
      el.classList.remove('is-active');
    }
  });
}

function renderAnimationUnits(animData) {
  if (!animData || !Array.isArray(animData.units) || !animData.units.length) return;
  renderUnits(animData.units);
}

function renderAtmosphere(animationState) {

function getTokenTranslate(el) {
  const m = /translate\(([-\d.]+)px,\s*([-\d.]+)px\)/.exec(el.style.transform || '');
  if (m) return { x: +m[1], y: +m[2] };
  return { x: +el.dataset.targetX || 0, y: +el.dataset.targetY || 0 };
}

function applyTokenSlideWithTrail(tokenNodes) {
  tokenNodes.forEach((el) => {
    const from = getTokenTranslate(el);
    const tx = +el.dataset.targetX;
    const ty = +el.dataset.targetY;
    if (!Number.isFinite(tx) || !Number.isFinite(ty)) return;
    const dx = tx - from.x;
    const dy = ty - from.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 2) {
      const nx = -dx / dist;
      const ny = -dy / dist;
      const s1 = Math.min(8, Math.max(3, dist * 0.18));
      const s2 = Math.min(16, Math.max(6, dist * 0.34));
      el.style.setProperty('--trail-x1', `${(nx * s1).toFixed(1)}px`);
      el.style.setProperty('--trail-y1', `${(ny * s1).toFixed(1)}px`);
      el.style.setProperty('--trail-x2', `${(nx * s2).toFixed(1)}px`);
      el.style.setProperty('--trail-y2', `${(ny * s2).toFixed(1)}px`);
      el.classList.add('is-moving');
    }
    el.style.transform = `translate(${tx}px, ${ty}px)`;
  });

  if (tokenTrailTimer) clearTimeout(tokenTrailTimer);
  tokenTrailTimer = setTimeout(() => {
    tokenNodes.forEach((el) => el.classList.remove('is-moving'));
    tokenTrailTimer = null;
  }, 360);
}

    C 455 535, 475 540, 510 542
    L 720 540
    L 720 560 L 440 560
    C 430 548, 425 535, 430 520
    C 435 505, 442 492, 450 478
    C 458 462, 462 445, 465 425
    L 470 400
    C 475 378, 478 358, 480 338
    L 482 310
    C 485 288, 492 268, 500 250
    L 510 225

  " fill="url(#landG2)" stroke="#3a4528" stroke-width="1.2" opacity=".65"/>

  <path d="M 530 420 C 570 418 620 425 680 435"
    fill="none" stroke="#3a4528" stroke-width=".5" opacity=".2" stroke-dasharray="3,4"/>

  <!-- ═══ SU ETİKETLERİ ═══ -->

  <text x="520" y="100" fill="#1e3a4a" font-family="var(--mono)" font-size="8"
    opacity=".25" letter-spacing="3">MARMARA DENİZİ</text>
  <text x="155" y="115" fill="#1e3a4a" font-family="var(--mono)" font-size="7"
    opacity=".35" letter-spacing="2" transform="rotate(-12,155,115)">SAROS KÖRFEZİ</text>

  <!-- ═══ MAYIN HATLARI ═══ -->
  <g id="minefields" opacity=".6">
    ${mineLine(460,340, 492,358, 7)}
    ${mineLine(455,355, 488,372, 6)}
    ${mineLine(450,370, 484,386, 8)}
    ${mineLine(458,383, 490,398, 5)}
    ${mineLine(453,395, 486,410, 6)}
    <text x="496" y="382" fill="#c9a84c" font-family="var(--mono)" font-size="5" opacity=".45">mayın hatları</text>
  </g>

  <!-- ═══ KIYI BATARYALARI ═══ -->
  <g id="forts" opacity=".55">
    ${fort(405,340,'Kilitbahir')} ${fort(400,365,'Mecidiye')} ${fort(395,385,'Hamidiye')}
    ${fort(415,310,'Namazgâh')} ${fort(498,345,'Çimenlik')} ${fort(495,365,'Mesudiye')}
    ${fort(345,468,'Ertuğrul')} ${fort(502,385,'Dardanos')}
  </g>

  <!-- ═══ KONUMLAR ═══ -->
  <g id="locations">
    ${BATTLE_DATA.locations.map(l=>`<g>
      <circle cx="${l.x}" cy="${l.y}" r="2.5" class="location-dot"/>
      <text x="${l.x+5}" y="${l.y+3}" class="location-label">${l.name}</text></g>`).join('')}
  </g>

  <g id="battleEffects" class="battle-effects"></g>

  <!-- ═══ BİRLİK TOKENLERİ ═══ -->
  <g id="unitTokens" class="units-layer">${renderTokens(phase.id)}</g>

  <!-- Pusula -->
  <g transform="translate(670,52)" opacity=".4">
    <circle r="18" fill="none" stroke="#8a7535" stroke-width=".7"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#8a7535" stroke-width=".4"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#8a7535" stroke-width=".4"/>
    <polygon points="0,-14 -2.5,-6 2.5,-6" fill="#c9a84c"/>

  </g>

  <!-- Ölçek -->
  <g transform="translate(580,535)" opacity=".35">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#8a7535" stroke-width=".8"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#8a7535" stroke-width=".8"/>
    <line x1="70" y1="-3" x2="70" y2="3" stroke="#8a7535" stroke-width=".8"/>
    <text x="35" y="-5" text-anchor="middle" fill="#8a7535" font-family="var(--mono)" font-size="5.5">~10 km</text>
  </g>

  <text x="15" y="545" fill="#6a6040" font-family="var(--mono)" font-size="6" opacity=".4">Çanakkale 1915 – İnteraktif Savaş Haritası</text>

  ctr.innerHTML = '';
  ctr.appendChild(svg);

  const dateChip = document.createElement('div');
  dateChip.className = 'map-date-chip';
  dateChip.id = 'mapDateChip';
  dateChip.innerHTML = `<span class="map-date-day" id="mapDateDay">—</span><span class="map-date-month" id="mapDateMonth">Tarih</span><span class="map-date-year" id="mapDateYear"></span>`;
  ctr.appendChild(dateChip);

  const nb = document.createElement('div');
  nb.className='narration-box'; nb.id='narrationBox';
  nb.innerHTML=`<div class="narration-title" id="narrationTitle">${phase.title} – ${phase.date}</div><div class="narration-text" id="narrationText">${phase.narration}</div>`;
  ctr.appendChild(nb);
  updateMapDateIndicator(phase.date);
  attachClicks();
  renderBattleEffects(currentPhaseIndex);
}

function mineLine(x1,y1,x2,y2,n){let s='';for(let i=0;i<n;i++){const t=i/(n-1);const o=(.18+(i%4)*.07).toFixed(2);
  s+=`<circle cx="${x1+(x2-x1)*t}" cy="${y1+(y2-y1)*t}" r="2" fill="#c9a84c" opacity="${o}"></circle>`;}return s;}

function fort(x,y,name){return `<g>
  <rect x="${x-3}" y="${y-3}" width="6" height="6" fill="none" stroke="#c0392b" stroke-width=".8" transform="rotate(15,${x},${y})"/>
  <rect x="${x-2}" y="${y-2}" width="4" height="4" fill="#c0392b" opacity=".25" transform="rotate(15,${x},${y})"/>
  <text x="${x+5}" y="${y+2}" fill="#e07060" font-family="var(--mono)" font-size="4.5" opacity=".45">${name}</text></g>`;}

function renderBattleEffects(phaseIndex) {
  const layer = document.getElementById('battleEffects');
  if (!layer) return;
  if (!isNavalEraPhaseIndex(phaseIndex)) {
    layer.innerHTML = '';
    return;
  }

  const batteries = [
    { x: 405, y: 340 },
    { x: 498, y: 345 },
    { x: 395, y: 385 },
    { x: 495, y: 365 }
  ];
  const shipTargets = BATTLE_DATA.units
    .filter((u) => u.type === 'deniz' && u.faction !== 'ottoman')
    .filter((u) => (UNIT_ENTRY_PHASE_INDEX[u.id] ?? 0) <= phaseIndex)
    .map((u, idx) => ({ unit: u, target: getNarrativeNavalPosition(u, phaseIndex), idx }))
    .filter((entry) => entry.target);

  layer.innerHTML = shipTargets.map((entry) => {
    const battery = batteries[entry.idx % batteries.length];
    const d = entry.target;
    return `<g>
      <line class="battery-shot" style="--shot-delay:${(entry.idx * 0.09).toFixed(2)}s" x1="${battery.x}" y1="${battery.y}" x2="${d.x}" y2="${d.y}"></line>
      <circle class="battery-impact" cx="${d.x}" cy="${d.y}" r="4"></circle>
    </g>`;
  }).join('');
}

function renderTokens(pid, prevPositions = currentPositions, phaseIndex = currentPhaseIndex, prevPhaseIndex = currentPhaseIndex){
  const spreadNext = {};
  const spreadPrev = {};
  return BATTLE_DATA.units.map((u)=>{
    const entryIndex = UNIT_ENTRY_PHASE_INDEX[u.id] ?? 0;
    if (phaseIndex < entryIndex) return '';
    const phaseData = u.phases[pid];
    const d = phaseData || currentPositions[u.id];
    if (!d) return '';
    const f=BATTLE_DATA.factions[u.faction];
    const narrativeNext = getNarrativeNavalPosition(u, phaseIndex);
    const targetBase = narrativeNext || d;
    const hasPrev = !!prevPositions[u.id];
    const isEntryFrame = phaseIndex === entryIndex && !hasPrev;
    const prevBaseRaw = isEntryFrame ? getUnitEntryOrigin(u, targetBase) : (prevPositions[u.id] || d);
    const narrativePrev = isEntryFrame ? null : getNarrativeNavalPosition(u, prevPhaseIndex);
    const prev = narrativePrev || prevBaseRaw;
    const visible = phaseData ? 1 : 0.55;
    const prevOffset = getClusterOffset(spreadPrev, prev.x, prev.y, u, prevPhaseIndex);
    const targetOffset = getClusterOffset(spreadNext, targetBase.x, targetBase.y, u, phaseIndex);
    const sx = normalizeValue(Math.round(prev.x + prevOffset.x), 45, 680);
    const sy = normalizeValue(Math.round(prev.y + prevOffset.y), 18, 548);
    const tx = normalizeValue(Math.round(targetBase.x + targetOffset.x), 45, 680);
    const ty = normalizeValue(Math.round(targetBase.y + targetOffset.y), 18, 548);
    return `<g class="unit-token"
      data-unit-id="${u.id}"
      data-unit-name="${u.name}"
      data-unit-commander="${u.commander}"
      data-unit-strength="${u.strength}"
      data-phase-status="${phaseData ? (phaseData.status || 'Bilinmiyor') : 'Hazır durum'}"
      data-phase-objective="${phaseData ? (phaseData.objective || 'Bilinmiyor') : 'Bilinmiyor'}"
      data-phase-outcome="${phaseData ? (phaseData.outcome || 'Bilinmiyor') : 'Bilinmiyor'}"
      data-target-x="${tx}" data-target-y="${ty}"
      style="transform:translate(${sx}px, ${sy}px);opacity:${visible}">
      ${tokenShape(f,0,0)}
      <text x="0" y="18" text-anchor="middle" fill="${f.colorLight}" font-family="var(--mono)" font-size="5.5" class="unit-label">
        ${u.name.length>20?u.name.slice(0,18)+'…':u.name}
      </text>
    </g>`;
  }).join('');
}

function tokenShape(f,cx,cy){const c=f.color,cl=f.colorLight;switch(f.shape){
  // Osmanlı: Hilal ve Yıldız (Crescent + Star)
  case'star':{const r=10;return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c}" stroke="${cl}" stroke-width=".8" opacity=".92" filter="url(#glow)"/>`+
    `<path d="M${cx+5} ${cy-1} A6 6 0 1 0 ${cx+5} ${cy+1} A4.5 4.5 0 1 1 ${cx+5} ${cy-1}Z" fill="${cl}" opacity=".85" transform="rotate(-30,${cx},${cy})"/>`+
    `<polygon points="${cx-4},${cy-2} ${cx-3.2},${cy-0.2} ${cx-5.2},${cy+0.8} ${cx-3.4},${cy+0.8} ${cx-3},${cy+2.8} ${cx-2},${cy+1} ${cx-0.5},${cy+2.6} ${cx-0.8},${cy+0.5} ${cx+1},${cy+1.2} ${cx-0.2},${cy-0.6}" fill="${cl}" opacity=".85" transform="rotate(-30,${cx},${cy})"/>`;}
  // İngiliz: Çapa (Anchor) – deniz kuvvetleri sembolü
  case'diamond':{const r=10;return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c}" stroke="${cl}" stroke-width=".8" opacity=".92" filter="url(#glow)"/>`+
    `<line x1="${cx}" y1="${cy-6}" x2="${cx}" y2="${cy+5}" stroke="${cl}" stroke-width="1.2" opacity=".85"/>`+
    `<line x1="${cx-3}" y1="${cy-6}" x2="${cx+3}" y2="${cy-6}" stroke="${cl}" stroke-width="1" opacity=".85"/>`+
    `<path d="M${cx-5} ${cy+2} Q${cx-4} ${cy+6} ${cx} ${cy+5} Q${cx+4} ${cy+6} ${cx+5} ${cy+2}" fill="none" stroke="${cl}" stroke-width="1.1" opacity=".85"/>`+
    `<circle cx="${cx}" cy="${cy-7.5}" r="1.3" fill="none" stroke="${cl}" stroke-width=".8" opacity=".7"/>`;}
  // ANZAC: Yükselen Güneş (Rising Sun badge)
  case'circle':{const r=10;return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c}" stroke="${cl}" stroke-width=".8" opacity=".92" filter="url(#glow)"/>`+
    `<path d="M${cx-7} ${cy+2} Q${cx} ${cy+5} ${cx+7} ${cy+2}" fill="none" stroke="${cl}" stroke-width=".8" opacity=".7"/>`+
    Array.from({length:9},(_, i)=>{const a=-Math.PI+((i+1)*Math.PI/10);const x1=cx+Math.cos(a)*2.5;const y1=cy+2+Math.sin(a)*2.5;const x2=cx+Math.cos(a)*7;const y2=cy+2+Math.sin(a)*7;return`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${cl}" stroke-width=".6" opacity=".8"/>`;}).join('')+
    `<circle cx="${cx}" cy="${cy+2}" r="2.5" fill="${cl}" opacity=".7"/>`;}
  // Fransız: Fleur-de-lis
  case'triangle':{const r=10;return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c}" stroke="${cl}" stroke-width=".8" opacity=".92" filter="url(#glow)"/>`+
    `<path d="M${cx} ${cy-7} C${cx+1.5} ${cy-4} ${cx+4} ${cy-2} ${cx+4} ${cy+1} C${cx+4} ${cy+3} ${cx+2} ${cy+3} ${cx+1} ${cy+1} L${cx+1} ${cy+5} L${cx-1} ${cy+5} L${cx-1} ${cy+1} C${cx-2} ${cy+3} ${cx-4} ${cy+3} ${cx-4} ${cy+1} C${cx-4} ${cy-2} ${cx-1.5} ${cy-4} ${cx} ${cy-7}Z" fill="${cl}" opacity=".8"/>`+
    `<line x1="${cx-3}" y1="${cy+5}" x2="${cx+3}" y2="${cy+5}" stroke="${cl}" stroke-width=".8" opacity=".7"/>`;}
}}

function attachClicks(){
  const tg = document.getElementById('unitTokens');
  if (!tg || tg.dataset.clickBound === '1') return;
  tg.dataset.clickBound = '1';
  tg.addEventListener('click', (ev) => {
    const el = ev.target.closest('.unit-token');
    if (!el) return;
    const unitId = el.dataset.unitId;
    const unit = BATTLE_DATA.units.find((u)=>u.id===unitId);
    if (!unit) return;
    const phase = BATTLE_DATA.phases[currentPhaseIndex];
    const phaseData = unit.phases[phase.id] || {status:'Bilinmiyor',objective:'Bilinmiyor',outcome:'Bilinmiyor'};
    showUnitPanel(unit, phaseData);
  });
}

function setActivePhase(i){
  const len = BATTLE_DATA.phases.length;
  const nextIndex = ((i % len) + len) % len;
  const fromPhaseIndex = currentPhaseIndex;
  currentPhaseIndex = nextIndex;
  const p = BATTLE_DATA.phases[nextIndex];
  const ind = document.getElementById('phaseIndicator');
  if (ind) {
    ind.textContent = `${p.title} – ${p.date}`;
  }
  updateTimelineActiveState();
  focusActiveTimelineMarker();
  updateMapDateIndicator(p.date);

  updateNarrationPanel(p);

  const tg = document.getElementById('unitTokens');
  if (tg) {
    const prevPositions = { ...currentPositions };
    const nextMarkup = renderTokens(p.id, prevPositions, nextIndex, fromPhaseIndex);
    tg.innerHTML = nextMarkup;
    const tokenNodes = [...tg.querySelectorAll('.unit-token')];
    requestAnimationFrame(() => applyTokenSlideWithTrail(tokenNodes));
  }
  renderBattleEffects(nextIndex);

  const currentIso = String(p.isoStart || normalizeDateText(p.date, nextIndex));
  const animData = window.ANIMATION_EVENTS_BY_DATE?.[currentIso];
  if (animData) {
    if (animData.units?.length) {
      renderAnimationUnits(animData);
    }
    renderAtmosphere(animData.animationState);
    renderTransition(animData.sceneTransition);
  } else {
    renderUnits(undefined);
    renderAtmosphere(null);
    renderTransition('');
  }

  BATTLE_DATA.units.forEach((u) => {
    const entryIndex = UNIT_ENTRY_PHASE_INDEX[u.id] ?? 0;
    if (nextIndex < entryIndex) {
      delete currentPositions[u.id];
      return;
    }
    const pd = getNarrativeNavalPosition(u, nextIndex) || u.phases[p.id];
    if (pd) currentPositions[u.id] = { x: pd.x, y: pd.y };
  });
}

function renderTimeline(){
  const guideEntries = WEEKLY_GUIDE.length
    ? WEEKLY_GUIDE
    : BATTLE_DATA.phases.map((p, i) => ({
      id: `rehber-${i}`,
      startIso: p.isoStart || normalizeDateText(p.date, i),
      endIso: p.isoStart || normalizeDateText(p.date, i),
      label: p.date,
      title: p.title,
      importance: p.importance || 'minor'
    }));

  document.querySelector('.timeline').innerHTML=`
    <div class="timeline-label">Olay Akışı Kronolojisi</div>
    <div class="timeline-controls"><button class="timeline-btn" id="playPauseBtn" type="button" aria-label="Animasyonu başlat">Başlat</button></div>
    <div class="timeline-track"><div class="timeline-line"></div><div class="timeline-phases">
      ${guideEntries.map((w,i)=>`<button class="phase-marker ${w.importance === 'major' ? 'major' : 'minor'}" type="button" data-week-index="${i}" data-start-iso="${w.startIso}" aria-label="${w.label}">
        <span class="phase-dot"></span>
        <span class="phase-tooltip">${w.title}<span class="phase-tooltip-date">${w.label}</span></span>
      </button>`).join('')}
    </div></div>`;
  const playPauseBtn = document.getElementById('playPauseBtn');
  if (playPauseBtn) {
    playPauseBtn.addEventListener('click', toggleAutoPlay);
  }
  document.querySelectorAll('.phase-marker').forEach((el)=>el.addEventListener('click',()=>{
    const startIso = el.dataset.startIso;
    setActivePhase(getPhaseIndexByIso(startIso));
  }));
  updateTimelineActiveState();
  focusActiveTimelineMarker();
}

document.addEventListener('DOMContentLoaded',init);
</script>
